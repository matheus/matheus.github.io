<header class="site-header">
  <div class="container flex-between">
    <a href="/" class="site-logo">{{ site.title }}</a>

    <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav">
      <a href="/" {% if page.url == '/' %}class="active"{% endif %}>Blog</a>
      <a href="/now/" {% if page.url == '/now/' %}class="active"{% endif %}>Agora</a>
      <a href="/produtos/automacoes/" {% if page.url contains '/produtos/' %}class="active"{% endif %}>Produtos</a>
    </nav>
  </div>
</header>

<script>
document.addEventListener('scroll', function() {
  document.querySelector('.site-header').classList.toggle('scrolled', window.scrollY > 10);
});

document.querySelector('.nav-toggle').addEventListener('click', function() {
  var nav = document.querySelector('.site-nav');
  nav.classList.toggle('nav-open');
  this.classList.toggle('nav-open');
  this.setAttribute('aria-expanded', nav.classList.contains('nav-open'));
});
</script>
