---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%d de %B de %Y' }}</time>
      <span class="sep">·</span>
      <span class="reading-time">{{ content | number_of_words | divided_by: 200 | plus: 1 }} min de leitura</span>
    </div>
  </header>
  <div class="post-content reading-width">
    {{ content }}
  </div>
  <footer class="post-footer reading-width">
    <a href="/" class="back-link">← Voltar para o blog</a>
  </footer>
</article>
