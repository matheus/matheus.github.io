<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matheus Godoy</title>
  <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png">
  <link rel="icon" href="./favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">

  <meta name="description" content="Matheus Godoy — mais orçamentos para sua empresa, com menos correria, mais lucro e mais liberdade.">
  <style>
    :root {
      --bg: #F7F9FC;
      --card: #FFFFFF;
      --border: #E5EAF1;
      --text: #16213E;
      --muted: #4B5563;
      --blue: #2F80ED;
      --green: #27AE60;
      --green-dark: #1F8A4D;
      --shadow: 0 28px 90px rgba(22, 33, 62, .10);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(47, 128, 237, .10), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(39, 174, 96, .10), transparent 25%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    main {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 44px);
    }

    .hero {
      width: min(1040px, 100%);
      min-height: calc(100svh - clamp(36px, 8vw, 88px));
      display: grid;
      place-items: center;
      text-align: center;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--border);
      border-radius: clamp(30px, 5vw, 52px);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: clamp(28px, 6vw, 74px);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: clamp(18px, 4vw, 42px);
      border: 1px solid rgba(47, 128, 237, .10);
      border-radius: clamp(22px, 4vw, 42px);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: clamp(18px, 3vw, 30px);
    }

    .name {
      margin: 0;
      font-size: clamp(15px, 2vw, 22px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--blue);
    }

    h1 {
      margin: 0;
      max-width: 940px;
      font-size: clamp(48px, 9vw, 118px);
      line-height: .86;
      letter-spacing: -.08em;
      font-weight: 950;
      text-transform: uppercase;
    }

    .tagline {
      margin: 0;
      max-width: 820px;
      font-size: clamp(23px, 3.6vw, 44px);
      line-height: 1.02;
      letter-spacing: -.055em;
      font-weight: 900;
      color: var(--muted);
      text-transform: lowercase;
    }

    .btn {
      margin-top: clamp(4px, 1vw, 10px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: clamp(58px, 7vw, 72px);
      padding: 0 clamp(26px, 5vw, 42px);
      border-radius: 20px;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      font-size: clamp(17px, 2.4vw, 24px);
      font-weight: 950;
      letter-spacing: .035em;
      text-transform: uppercase;
      box-shadow: 0 18px 42px rgba(39, 174, 96, .30);
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: var(--green-dark);
      box-shadow: 0 22px 48px rgba(39, 174, 96, .36);
    }

    @media (max-width: 640px) {
      main { padding: 14px; }

      .hero {
        min-height: calc(100svh - 28px);
        padding: 28px 20px;
      }

      .content { gap: 18px; }

      h1 { font-size: clamp(42px, 14vw, 66px); }

      .tagline { font-size: clamp(21px, 7vw, 31px); }

      .btn {
        width: 100%;
        max-width: 360px;
      }
    }

    @media (max-height: 680px) {
      .content { gap: 14px; }

      h1 { font-size: clamp(40px, 8vw, 84px); }

      .tagline { font-size: clamp(20px, 3vw, 34px); }

      .btn { min-height: 56px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Matheus Godoy">
      <div class="content">
        <p class="name">Matheus Godoy</p>
        <h1>Trago mais orçamentos para sua empresa</h1>
        <p class="tagline">menos correria, mais lucro e mais liberdade</p>
        <a class="btn" href="/maisclientes">Conhecer o Mais Clientes →</a>
      </div>
    </section>
  </main>
</body>
</html>
