<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0d14">
  <meta name="description" content="Tecnologia para Humanos — Matheus Godoy.">
  <title>Matheus Godoy — Tecnologia para Humanos</title>

  <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png">
  <link rel="icon" href="./favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">

  <style>
    :root {
      color-scheme: dark;
      --page: #0a0d14;
      --card: #131925;
      --line: #293348;
      --text: #f5f7fb;
      --muted: #9ba8be;
      --accent: #72a6ff;
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      padding: 28px 20px;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--page);
    }

    main {
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      overflow: hidden;
      border: 2px solid var(--line);
      border-radius: 50%;
      background: #101622;
    }

    .avatar img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      border-radius: inherit;
    }

    h1 {
      max-width: 11ch;
      margin: 0 auto;
      font-size: clamp(2rem, 10vw, 2.8rem);
      line-height: 1.03;
      letter-spacing: -.055em;
      font-weight: 800;
      text-wrap: balance;
    }

    .name {
      margin: 12px 0 32px;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    nav { display: grid; gap: 12px; }

    .link {
      min-height: 60px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background: var(--card);
      font-size: .94rem;
      font-weight: 750;
      letter-spacing: .08em;
      text-decoration: none;
      transition: transform .18s ease, border-color .18s ease, background-color .18s ease;
    }

    .link:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: #182238;
    }

    .link:active { transform: translateY(0); }

    .link:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    @media (min-width: 600px) {
      body { padding: 48px 24px; }
      .avatar { width: 144px; height: 144px; margin-bottom: 28px; }
      .name { margin-bottom: 36px; }
      .link { min-height: 64px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .link { transition: none; }
    }
  </style>
</head>

<body>
  <main>
    <div class="avatar">
      <img src="./m82.webp" width="640" height="640" alt="Avatar futurista de Matheus Godoy">
    </div>

    <h1>Tecnologia para Humanos</h1>
    <p class="name">Matheus Godoy</p>

    <nav aria-label="Links principais">
      <a class="link" href="/markmap">MARKMAP</a>
      <a class="link" href="/tiercraft">TIERCRAFT</a>
      <a class="link" href="mailto:matheusgodoy@gmail.com">FALE COMIGO</a>
    </nav>
  </main>
</body>
</html>
