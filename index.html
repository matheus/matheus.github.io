<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matheus Godoy</title>
  <meta name="description" content="Matheus Godoy — mais orçamentos para sua empresa, com menos correria, mais lucro e mais liberdade.">

  <style>
    :root {
      --bg: #F7F9FC;
      --card: #FFFFFF;
      --border: #E5EAF1;
      --text: #16213E;
      --muted: #4B5563;
      --blue: #2F80ED;
      --blue-light: #56CCF2;
      --green: #27AE60;
      --green-dark: #1F8A4D;
      --shadow: 0 24px 70px rgba(22, 33, 62, .09);
      --radius: 32px;
      --max: 1160px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.35;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 42px);
    }

    .hero {
      width: min(var(--max), 100%);
      min-height: calc(100svh - clamp(32px, 8vw, 84px));
      display: grid;
      place-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: clamp(34px, 5vw, 52px);
      box-shadow: var(--shadow);
      padding: clamp(28px, 6vw, 78px);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: clamp(24px, 4vw, 44px);
      border: 2px solid rgba(47, 128, 237, .10);
      border-radius: clamp(26px, 4vw, 42px);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: min(460px, 70vw);
      height: min(460px, 70vw);
      right: -120px;
      top: -160px;
      border-radius: 50%;
      background: #F2F7FF;
      border: 1px solid var(--border);
      opacity: .95;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      width: min(360px, 70vw);
      height: min(360px, 70vw);
      left: -120px;
      bottom: -150px;
      border-radius: 50%;
      background: rgba(39, 174, 96, .10);
      border: 1px solid rgba(39, 174, 96, .10);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      display: grid;
      justify-items: center;
      gap: clamp(18px, 3vw, 30px);
      max-width: 980px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 15px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      color: var(--muted);
      box-shadow: 0 10px 30px rgba(22, 33, 62, .04);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .pill::before {
      content: "";
      width: 10px;
      height: 10px;
      background: var(--green);
      border-radius: 999px;
      box-shadow: 0 0 0 6px rgba(39, 174, 96, .13);
    }

    h1 {
      margin: 0;
      max-width: 980px;
      font-size: clamp(54px, 8vw, 108px);
      line-height: .88;
      letter-spacing: -0.075em;
      font-weight: 950;
      text-transform: uppercase;
    }

    .lead {
      margin: 0;
      max-width: 760px;
      font-size: clamp(24px, 3.2vw, 42px);
      line-height: 1.06;
      letter-spacing: -0.055em;
      color: var(--muted);
      font-weight: 900;
      text-transform: lowercase;
    }

    .cta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 6px;
    }

    .btn {
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 0 30px;
      border-radius: 18px;
      background: var(--green);
      color: #fff;
      font-size: clamp(17px, 2vw, 20px);
      font-weight: 900;
      letter-spacing: .04em;
      box-shadow: 0 18px 38px rgba(39, 174, 96, .28);
      transition: .18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: var(--green-dark);
    }

    .mini-proof {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 2px;
      color: var(--muted);
      font-size: clamp(14px, 1.8vw, 17px);
      font-weight: 750;
    }

    .mini-proof span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .mini-proof span::before {
      content: "✓";
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(39,174,96,.12);
      color: var(--green);
      font-size: 13px;
      font-weight: 950;
    }

    @media (max-width: 650px) {
      .page { padding: 14px; }

      .hero {
        min-height: calc(100svh - 28px);
        padding: 26px 20px;
        border-radius: 34px;
      }

      .hero::before {
        inset: 18px;
        border-radius: 26px;
      }

      .content { gap: 17px; }

      .pill {
        font-size: 13px;
        padding: 9px 13px;
      }

      h1 {
        font-size: clamp(44px, 14vw, 66px);
        line-height: .9;
      }

      .lead {
        font-size: clamp(22px, 7vw, 31px);
      }

      .btn {
        width: 100%;
        max-width: 360px;
        min-height: 60px;
        padding: 0 22px;
      }

      .mini-proof {
        gap: 8px 12px;
        max-width: 320px;
      }
    }

    @media (max-height: 680px) {
      .content { gap: 13px; }

      h1 {
        font-size: clamp(38px, 7.5vw, 78px);
      }

      .lead {
        font-size: clamp(19px, 3vw, 31px);
      }

      .btn { min-height: 56px; }

      .mini-proof { font-size: 13px; }
    }
  </style>

  <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png">
  <link rel="icon" href="./favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">
</head>

<body>
  <main class="page">
    <section class="hero" aria-label="Matheus Godoy">
      <div class="glow"></div>

      <div class="content">
        <div class="pill">Matheus Godoy</div>
        <h1>Trago mais orçamentos para sua empresa</h1>
        <p class="lead">menos correria, mais lucro e mais liberdade</p>

        <div class="cta-row">
          <a class="btn" href="/maisclientes">Conhecer o Mais Clientes →</a>
        </div>

        <div class="mini-proof" aria-label="Diferenciais">
          <span>Sem mensalidade</span>
          <span>Feito para micro empresas</span>
          <span>Foco em orçamento</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
