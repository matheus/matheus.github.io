<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matheus Godoy</title>
  <meta name="description" content="Matheus Godoy - mais orçamentos para sua empresa, com menos correria, mais lucro e mais liberdade.">

  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --text: #171915;
      --muted: #5c6258;
      --accent: #1f9d55;
      --accent-hover: #187a42;
      --max: 980px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.35;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      height: 100svh;
      display: grid;
      align-items: center;
      padding: 22px;
      overflow: hidden;
    }

    .hero {
      width: min(var(--max), 100%);
      margin: 0 auto;
      display: grid;
      align-items: center;
      justify-items: center;
      height: 100%;
      min-height: 0;
    }

    .content {
      display: grid;
      justify-items: center;
      gap: clamp(12px, 3.8svh, 18px);
      max-width: 760px;
      text-align: center;
    }

    .pill {
      width: fit-content;
      color: #3f453c;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 820px;
      color: var(--text);
      font-size: clamp(34px, 11.5vw, 68px);
      line-height: .88;
      letter-spacing: 0;
      font-weight: 900;
      text-wrap: balance;
    }

    .lead {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      font-size: clamp(17px, 5vw, 25px);
      line-height: 1.12;
      letter-spacing: 0;
      font-weight: 500;
      text-wrap: balance;
    }

    .cta-row {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: clamp(4px, 2svh, 10px);
    }

    .btn {
      width: 100%;
      min-height: 62px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      font-size: 15px;
      font-weight: 850;
      letter-spacing: .03em;
      text-transform: uppercase;
      transition: background-color .16s ease, transform .16s ease;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(31, 157, 85, .28);
      outline-offset: 4px;
    }

    @media (min-width: 640px) {
      .page {
        padding: 36px;
      }

      .content {
        gap: 22px;
      }

      .cta-row {
        margin-top: 14px;
      }

      .btn {
        width: auto;
        min-width: 370px;
        min-height: 68px;
        padding: 0 36px;
        font-size: 17px;
      }
    }

    @media (min-width: 980px) {
      .page {
        padding: 56px;
      }

      .content {
        gap: 24px;
      }

      h1 {
        font-size: clamp(62px, 6.5vw, 84px);
        line-height: .88;
      }

      .lead {
        font-size: clamp(24px, 2.2vw, 30px);
      }
    }

    @media (max-height: 620px) {
      .page {
        padding-top: 16px;
        padding-bottom: 16px;
      }

      .hero {
        min-height: 0;
        padding: 0;
      }

      .content {
        gap: 14px;
      }

      h1 {
        font-size: clamp(30px, 9vw, 56px);
      }

      .lead {
        font-size: clamp(15px, 4vw, 22px);
      }

      .btn {
        min-height: 56px;
      }
    }
  </style>

  <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png">
  <link rel="icon" href="./favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">
</head>

<body>
  <main class="page">
    <section class="hero" aria-label="Matheus Godoy">
      <div class="content">
        <div class="pill">Matheus Godoy</div>
        <h1>Trago mais orçamentos para sua empresa</h1>
        <p class="lead">menos correria, mais lucro e mais liberdade</p>

        <div class="cta-row">
          <a class="btn" href="/maisclientes">Conhecer o Mais Clientes &rarr;</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
