<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f8fa">
  <meta name="description" content="Produtos e recomendações selecionadas por Matheus Godoy.">
  <title>Links recomendados — Matheus Godoy</title>

  <style>
    :root {
      --background: #f7f8fa;
      --surface: #ffffff;
      --text: #172033;
      --muted: #60708a;
      --line: #dde3ec;
      --primary: #175cd3;
      --primary-hover: #0d4fbf;
    }

    * { box-sizing: border-box; }

    html { background: var(--background); }

    body {
      margin: 0;
      min-width: 0;
      background: var(--background);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    .page {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 36px 18px 52px;
    }

    header { margin-bottom: 26px; }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 9vw, 2.75rem);
      line-height: 1.08;
      letter-spacing: -.045em;
    }

    .intro {
      max-width: 54ch;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin: 0 -18px 30px;
      padding: 0 18px 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter {
      min-height: 40px;
      padding: 8px 14px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font: inherit;
      font-size: .9rem;
      font-weight: 650;
      cursor: pointer;
      transition: background-color .16s ease, border-color .16s ease, color .16s ease;
    }

    .filter:hover { border-color: #9cbeff; color: var(--primary); }

    .filter[aria-pressed="true"] {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .filter:focus-visible {
      outline: 3px solid #8ab5ff;
      outline-offset: 2px;
    }

    #list { display: grid; gap: 30px; }

    section { scroll-margin-top: 20px; }

    h2 {
      margin: 0 0 14px;
      padding-left: 12px;
      border-left: 4px solid var(--primary);
      color: #101b31;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .products {
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--line);
      list-style: none;
    }

    .product {
      border-bottom: 1px solid var(--line);
    }

    .product a {
      min-height: 50px;
      padding: 12px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: color .16s ease, padding-left .16s ease;
    }

    .product a::after {
      flex: 0 0 auto;
      color: var(--primary);
      font-size: 1.25rem;
      font-weight: 400;
      content: "→";
    }

    .product a:hover {
      padding-left: 8px;
      color: var(--primary);
    }

    .product a:focus-visible {
      outline: 3px solid #8ab5ff;
      outline-offset: 3px;
    }

    .message {
      padding: 20px;
      border-radius: 12px;
      background: #fff5f4;
      color: #9c2a20;
    }

    @media (min-width: 640px) {
      .page { padding: 64px 30px 80px; }
      .filters { margin-right: 0; margin-left: 0; padding-right: 0; padding-left: 0; }
      #list { gap: 38px; }
      h2 { font-size: 1.45rem; }
      .product a { min-height: 54px; padding-top: 13px; padding-bottom: 13px; font-size: 1.05rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .product a { transition: none; }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <h1>PRODUTOS QUE RECOMENDO</h1>
      <p class="intro">Uma seleção direta de produtos que recomendo. Escolha uma categoria e toque no item para ver a oferta.</p>
    </header>

    <div class="filters" id="filters" aria-label="Filtrar por categoria"></div>
    <div id="list" aria-live="polite"></div>
  </main>

  <script>
    const list = document.getElementById('list');
    const filters = document.getElementById('filters');

    const render = (categories, selectedCategory = 'Todos') => {
      list.replaceChildren();

      categories
        .filter((category) => selectedCategory === 'Todos' || category.name === selectedCategory)
        .forEach((category) => {
          const section = document.createElement('section');
          const title = document.createElement('h2');
          const products = document.createElement('ul');

          title.textContent = category.name;
          products.className = 'products';

          category.products.forEach((product) => {
            const item = document.createElement('li');
            const link = document.createElement('a');

            item.className = 'product';
            link.href = product.url;
            link.target = '_blank';
            link.rel = 'sponsored noopener noreferrer';
            link.textContent = product.name;

            item.append(link);
            products.append(item);
          });

          section.append(title, products);
          list.append(section);
        });
    };

    fetch('./products.json')
      .then((response) => {
        if (!response.ok) throw new Error('Não foi possível carregar os produtos.');
        return response.json();
      })
      .then(({ categories }) => {
        ['Todos', ...categories.map((category) => category.name)].forEach((categoryName) => {
          const filter = document.createElement('button');

          filter.className = 'filter';
          filter.type = 'button';
          filter.textContent = categoryName;
          filter.setAttribute('aria-pressed', categoryName === 'Todos');
          filter.addEventListener('click', () => {
            filters.querySelectorAll('.filter').forEach((button) => {
              button.setAttribute('aria-pressed', button === filter);
            });
            render(categories, categoryName);
          });

          filters.append(filter);
        });

        render(categories);
      })
      .catch((error) => {
        const message = document.createElement('p');
        message.className = 'message';
        message.textContent = error.message;
        list.append(message);
      });
  </script>
</body>
</html>
